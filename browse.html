<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse — DAR</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav>
  <a href="/" class="logo">
    <img src="assets/logo.png" alt="DAR" style="height:32px;width:auto;vertical-align:middle">
    <small>Arabic Research Archive</small>
  </a>
  <div class="nav-links">
    <a href="/">Browse</a>
    <a href="search.html">Search</a>
    <a href="submit.html">Submit</a>
    <a href="https://github.com/ahmdngi/dar" target="_blank">GitHub</a>
  </div>
</nav>

<div class="container">
  <div class="section-header">
    <h2>All Papers</h2>
    <span class="count" id="paper-count-label">1 paper</span>
  </div>
  <div class="paper-grid" id="paper-grid"></div>
</div>

<footer>
  DAR — Arabic Research Archive. Open source on <a href="https://github.com/ahmdngi/dar">GitHub</a>.
</footer>

<script>
const papers = [
  {
    slug: "shipcrawler-ieee-access",
    title: "A Proactive Defense: An Open-Source Intelligence (OSINT) Framework for Maritime Cybersecurity",
    title_ar: "دفاع استباقي: إطار استخباراتي مفتوح المصدر للأمن السيبراني البحري",
    authors: "Ahmed Nagi Nasr, Aybars Oruç, Ricardo Lugo, Inga Zaitseva-Pärnaste, Pentti Kujala",
    venue: "IEEE Access, 2026",
    doi: "10.1109/ACCESS.2026.3673557",
    license: "CC BY 4.0",
    abstract: "The accelerating digital transformation of the maritime industry has significantly expanded its cyber-attack surface. This paper presents a specialized maritime OSINT framework with a five-phase workflow, supported by a comprehensive taxonomy of maritime cyber threats and a curated toolkit of over 100 OSINT resources.",
    tags: ["Maritime", "OSINT", "Cybersecurity"]
  }
];

const grid = document.getElementById('paper-grid');
const countLabel = document.getElementById('paper-count-label');
if (countLabel) countLabel.textContent = papers.length + ' paper' + (papers.length !== 1 ? 's' : '');
if (grid) {
  grid.innerHTML = papers.map(p => `
    <div class="paper-card">
      <div class="meta">
        <span>${p.venue}</span>
        <span class="tag">${p.license}</span>
        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <h3><a href="papers/${p.slug}/">${p.title}</a></h3>
      <div style="font-size:0.8rem;color:var(--accent-2);margin-bottom:0.3rem" dir="rtl">${p.title_ar}</div>
      <div class="authors">${p.authors}</div>
      <div class="abstract">${p.abstract}</div>
      <div class="actions">
        <a href="papers/${p.slug}/">Read in Arabic →</a>
        <a href="https://doi.org/${p.doi}" target="_blank">Original</a>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
