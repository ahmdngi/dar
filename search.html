<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">Search — DAR</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="assets/css/style.css">
<script>
window.i18n = {
  ar: {
    title: "بحث — دار",
    nav_browse: "تصفح",
    nav_search: "بحث",
    nav_submit: "تقديم",
    search_title: "البحث في الأبحاث",
    search_desc: "ابحث في العناوين والملخصات والمؤلفين بالعربية والإنجليزية",
    search_placeholder: "ابحث عن أبحاث...",
    no_results: "لم يتم العثور على أبحاث.",
    footer: "دار — أرشيف الأبحاث العربية. مفتوح المصدر على جيتهاب."
  },
  en: {
    title: "Search — DAR",
    nav_browse: "Browse",
    nav_search: "Search",
    nav_submit: "Submit",
    search_title: "Search Papers",
    search_desc: "Search English and Arabic titles, abstracts, and authors",
    search_placeholder: "Search papers...",
    no_results: "No papers found.",
    footer: "DAR — Arabic Research Archive. Open source on GitHub."
  }
};
</script>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <img src="assets/logo.png" alt="DAR" style="height:32px;width:auto;vertical-align:middle">
    <small>Arabic Research Archive</small>
  </a>
  <div class="nav-links">
    <a href="/" data-i18n="nav_browse">Browse</a>
    <a href="search.html" data-i18n="nav_search">Search</a>
    <a href="submit.html" data-i18n="nav_submit">Submit</a>
    <a href="https://github.com/ahmdngi/dar" target="_blank">GitHub</a>
  </div>
</nav>

<div class="container">
  <div style="text-align:center;margin-bottom:2rem">
    <h1 data-i18n="search_title">Search Papers</h1>
    <p style="color:var(--text-2);margin-top:0.5rem" data-i18n="search_desc">Search English and Arabic titles, abstracts, and authors</p>
  </div>

  <div style="max-width:600px;margin:0 auto 2rem">
    <input type="text" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="Search papers..." style="width:100%;padding:0.8rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem">
  </div>

  <div id="search-results" class="paper-grid"></div>
  <div id="search-empty" style="text-align:center;color:var(--text-2);padding:3rem;display:none" data-i18n="no_results">No papers found.</div>
</div>

<footer data-i18n="footer">
  DAR — Arabic Research Archive. Open source on <a href="https://github.com/ahmdngi/dar">GitHub</a>.
</footer>

<script src="assets/js/i18n.js"></script>
<script>
const papers = [
  {
    slug: "msoc-transnav",
    title: "Maritime Security Operations Center (M-SOC): Systematic Literature Review, Research Gaps and Future Areas to Investigate",
    title_ar: "مركز العمليات الأمنية البحرية (M-SOC): مراجعة منهجية للأدبيات، الفجوات البحثية والمجالات المستقبلية",
    authors: "A.N. Nasr, R. Vaarandi, I. Zaitseva-Pärnaste, P. Kujala",
    venue: "TransNav, 2025",
    doi: "10.12716/1001.19.04.11",
    license: "CC BY 4.0",
    abstract: "A systematic literature review of Maritime Security Operations Centers (M-SOC) using the SALSA framework. Identifies key trends, challenges, and opportunities in maritime cybersecurity operations.",
    tags: ["Maritime", "M-SOC", "Cybersecurity", "SLR"]
  },
  {
    slug: "shipcrawler-ieee-access",
    title: "A Proactive Defense: An Open-Source Intelligence (OSINT) Framework for Maritime Cybersecurity",
    title_ar: "دفاع استباقي: إطار استخباراتي مفتوح المصدر للأمن السيبراني البحري",
    authors: "Ahmed Nagi Nasr, Aybars Oruç, Ricardo Lugo, Inga Zaitseva-Pärnaste, Pentti Kujala",
    venue: "IEEE Access, 2026",
    doi: "10.1109/ACCESS.2026.3673557",
    license: "CC BY 4.0",
    abstract: "The accelerating digital transformation of the maritime industry has significantly expanded its cyber-attack surface. This paper presents a specialized maritime OSINT framework with a five-phase workflow, supported by a comprehensive taxonomy of maritime cyber threats and a curated toolkit of over 100 OSINT resources.",
    tags: ["Maritime", "OSINT", "Cybersecurity"]
  }
];

const searchInput = document.getElementById('search-input');
const results = document.getElementById('search-results');
const empty = document.getElementById('search-empty');

function renderResults(query) {
  const q = query.toLowerCase();
  const filtered = papers.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.title_ar.includes(q) ||
    p.abstract.toLowerCase().includes(q) ||
    p.authors.toLowerCase().includes(q)
  );
  empty.style.display = filtered.length === 0 ? 'block' : 'none';
  results.innerHTML = filtered.map(p => `
    <div class="paper-card">
      <div class="meta">
        <span>${p.venue}</span>
        <span class="tag">${p.license}</span>
        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <a href="papers/${p.slug}/">
        <h3>${p.title}</h3>
      </a>
      <p class="authors">${p.authors}</p>
      <p class="abstract">${p.abstract.slice(0, 200)}${p.abstract.length > 200 ? '...' : ''}</p>
      <a href="papers/${p.slug}/" class="read-more">Read →</a>
    </div>
  `).join('');
}

searchInput.addEventListener('input', (e) => renderResults(e.target.value));
if (!searchInput.value) renderResults('');
</script>
</body>
</html>
