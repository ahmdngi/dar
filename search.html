const searchInput = document.getElementById('search-input');
const results = document.getElementById('search-results');
const empty = document.getElementById('search-empty');

const lang = localStorage.getItem('dar-lang') === 'ar' ? 'ar' : 'en';

function renderResults(query) {
  const q = query.toLowerCase();
  const currentLang = localStorage.getItem('dar-lang') === 'ar' ? 'ar' : 'en';
  const filtered = papers.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.title_ar.includes(q) ||
    p.abstract.toLowerCase().includes(q) ||
    (p.abstract_ar && p.abstract_ar.includes(q)) ||
    p.authors.toLowerCase().includes(q)
  );
  empty.style.display = filtered.length === 0 ? 'block' : 'none';
  results.innerHTML = filtered.map(p => {
    const title = currentLang === 'ar' && p.title_ar ? p.title_ar : p.title;
    const abstract = currentLang === 'ar' && p.abstract_ar ? p.abstract_ar : p.abstract;
    return `
    <div class="paper-card">
      <div class="meta">
        <span>${p.venue}</span>
        <span class="tag">${p.license}</span>
        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <a href="papers/${p.slug}/">
        <h3>${title}</h3>
      </a>
      <p class="authors">${p.authors}</p>
      <p class="abstract">${abstract.slice(0, 200)}${abstract.length > 200 ? '...' : ''}</p>
      <a href="papers/${p.slug}/" class="read-more">${currentLang === 'ar' ? 'اقرأ ←' : 'Read →'}</a>
    </div>
  `}).join('');
}

searchInput.addEventListener('input', (e) => renderResults(e.target.value));
if (!searchInput.value) renderResults('');
document.addEventListener('langchange', function() {
  if (searchInput.value) renderResults(searchInput.value);
  else renderResults('');
});
