name: Paper Translation Request
description: Submit an open-access paper for Arabic translation
title: "[Translation] Paper Title"
labels: [translation]
body:
  - type: input
    id: url
    attributes:
      label: Paper URL or DOI
      description: Link to the open-access paper (arXiv, IEEE Access, PubMed Central, etc.)
      placeholder: "https://doi.org/10.1109/ACCESS.2026.3673557"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why should this paper be translated?
      description: Brief explanation of the paper's relevance to the Arabic-speaking research community
      placeholder: "This paper covers maritime cybersecurity and would benefit Arabic-speaking researchers..."
  - type: checkboxes
    id: rights
    attributes:
      label: Rights confirmation
      options:
        - label: I confirm this paper is open access (CC license, arXiv, or OA)
          required: true
  - type: input
    id: submitter
    attributes:
      label: Submitted by (optional)
      placeholder: "Your name or affiliation"
